<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kommunedata</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">
          <span class="brand-mark__shape brand-mark__shape--one"></span>
          <span class="brand-mark__shape brand-mark__shape--two"></span>
        </div>
        <div class="brand-copy">
          <strong>Kommunedata Vestland</strong>
        </div>
      </div>
    </header>

    <div class="workspace">
      <main class="map-stage">
        <section class="map-panel">
          <div class="map-surface">
            <svg id="vestland-map" role="img" aria-labelledby="map-title" aria-describedby="map-note"></svg>
            <div class="map-tooltip" id="map-tooltip" role="status" aria-live="polite"></div>

            <div class="map-accessible-copy">
              <p class="eyebrow">Kart</p>
              <h1 id="map-title">Velg en statistikk</h1>
              <p id="map-note">
                Kommunene starter nøytralt. Fjorder og sjø vises i blått mellom landflatene.
              </p>
            </div>

            <div class="legend-card">
              <strong>Tegnforklaring</strong>
              <div class="legend">
                <span class="legend__item"><i class="legend__swatch legend__swatch--good"></i>Bra</span>
                <span class="legend__item"><i class="legend__swatch legend__swatch--medium"></i>Middels</span>
                <span class="legend__item"><i class="legend__swatch legend__swatch--bad"></i>Dårlig</span>
                <span class="legend__item"><i class="legend__swatch legend__swatch--missing"></i>Mangler data</span>
              </div>
            </div>

          </div>

          <div class="map-stat-card" id="map-stat-card" aria-live="polite">
            <strong id="map-stat-title">Velg statistikk</strong>
            <span><b id="map-stat-good">0</b> bra</span>
            <span><b id="map-stat-medium">0</b> middels</span>
            <span><b id="map-stat-bad">0</b> dårlig</span>
          </div>
        </section>

        <aside class="insight-panel">
          <div class="insight-card">
            <div class="metric-list" id="metric-list"></div>
          </div>

        </aside>
      </main>
    </div>

  </div>

  <script src="data/vestland-land.js"></script>
  <script src="data/arbeidsledighet-2026-april.js"></script>
  <script src="data/uforetrygd-2024.js"></script>
  <script src="data/driftsresultat-2025.js"></script>
  <script src="data/private-planer-2025.js"></script>
  <script src="data/sykefravaer-2025k4.js"></script>
  <script src="script.js"></script>
</body>
</html>
